<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">lmprobe workflow diagram</title>
  <desc id="desc">Repository input flows through lmprobe commands into structured evidence envelopes.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#173f37"/>
      <stop offset="1" stop-color="#1e5f70"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#17201b" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="960" height="640" rx="24" fill="#f4f7f2"/>
  <rect x="74" y="70" width="812" height="500" rx="22" fill="url(#panel)" filter="url(#shadow)"/>
  <g fill="none" stroke="#bde7d9" stroke-width="3" stroke-linecap="round">
    <path d="M224 320h144"/>
    <path d="M592 320h144"/>
    <path d="M480 200v-64"/>
    <path d="M480 440v64"/>
  </g>
  <g fill="#ecfff7" font-family="Inter, Arial, sans-serif">
    <text x="122" y="130" font-size="28" font-weight="800">lmprobe</text>
    <text x="122" y="162" font-size="16" opacity="0.82">one-shot code evidence</text>
  </g>
  <g>
    <rect x="112" y="250" width="210" height="140" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="142" y="306" fill="#173f37" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Repository</text>
    <text x="142" y="338" fill="#5b655e" font-family="Inter, Arial, sans-serif" font-size="15">source, history, config</text>
  </g>
  <g>
    <rect x="370" y="218" width="220" height="204" rx="18" fill="#e9f7ef"/>
    <text x="412" y="274" fill="#173f37" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Commands</text>
    <text x="412" y="310" fill="#245e8f" font-family="Inter, Arial, sans-serif" font-size="15">search  graph  history</text>
    <text x="412" y="338" fill="#245e8f" font-family="Inter, Arial, sans-serif" font-size="15">context  query  secrets</text>
    <text x="412" y="366" fill="#245e8f" font-family="Inter, Arial, sans-serif" font-size="15">trace  fix</text>
  </g>
  <g>
    <rect x="638" y="250" width="210" height="140" rx="16" fill="#ffffff" opacity="0.96"/>
    <text x="674" y="306" fill="#173f37" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="800">Envelopes</text>
    <text x="674" y="338" fill="#5b655e" font-family="Inter, Arial, sans-serif" font-size="15">JSON, NDJSON, SARIF</text>
  </g>
  <g>
    <rect x="360" y="92" width="240" height="76" rx="14" fill="#ffffff" opacity="0.94"/>
    <text x="402" y="137" fill="#173f37" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">GraphQL composition</text>
  </g>
  <g>
    <rect x="372" y="472" width="216" height="76" rx="14" fill="#ffffff" opacity="0.94"/>
    <text x="414" y="516" fill="#173f37" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">CI and review output</text>
  </g>
  <g fill="#bde7d9">
    <circle cx="348" cy="320" r="7"/>
    <circle cx="612" cy="320" r="7"/>
    <circle cx="480" cy="185" r="7"/>
    <circle cx="480" cy="455" r="7"/>
  </g>
</svg>
